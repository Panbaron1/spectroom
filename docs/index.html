<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spectroom</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f8f6;
      color: #21262b;
      line-height: 1.6;
      padding: 0 16px;
    }
    .wrap { max-width: 600px; margin: 0 auto; padding: 80px 0 80px; text-align: center; }
    .logo-mark {
      width: 72px; height: 72px; border-radius: 18px;
      background: linear-gradient(135deg, #EFA79E, #F1C889, #8FD3B6, #93C2E6, #BCACE4);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 36px; color: #21262b;
      margin: 0 auto 24px;
    }
    h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 12px; }
    .tagline { font-size: 17px; color: #6b7280; margin-bottom: 56px; max-width: 420px; margin-left: auto; margin-right: auto; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .link-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 20px 28px; text-decoration: none; color: #21262b;
      transition: box-shadow 0.15s, transform 0.15s;
      min-width: 180px;
    }
    .link-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .link-card .icon { font-size: 28px; margin-bottom: 8px; }
    .link-card .label { font-weight: 700; font-size: 15px; }
    .link-card .sub { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .footer { margin-top: 72px; font-size: 13px; color: #9ca3af; }
    .footer a { color: #9ca3af; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-mark">S</div>
    <h1>Spectroom</h1>
    <p class="tagline">Visual routines and social stories for children — calm, pictogram-first, fully on-device.</p>

    <div class="links">
      <a href="privacy-policy.html" class="link-card">
        <div class="icon">🔒</div>
        <div class="label">Privacy Policy</div>
        <div class="sub">No data collected — ever</div>
      </a>
      <a href="terms.html" class="link-card">
        <div class="icon">📄</div>
        <div class="label">Terms &amp; Conditions</div>
        <div class="sub">How you may use the app</div>
      </a>
    </div>

    <div class="footer">
      <p>Made by <a href="mailto:milan.tomas.cz@gmail.com">Milan Tomáš</a> · Czech Republic</p>
    </div>
  </div>
</body>
</html>
